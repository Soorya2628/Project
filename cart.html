<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
  }
  header {
    background: linear-gradient(90deg, #e0521f, #c0392b);
    color: white;
    padding: 20px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { margin: 0; font-size: 26px; }
  header a {
    color: white;
    text-decoration: none;
    background: rgba(255,255,255,0.15);
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
  }
  .main {
    display: flex;
    gap: 30px;
    padding: 30px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  #cart-items {
    flex: 2;
    min-width: 300px;
  }
  .cart-item {
    display: flex;
    align-items: center;
    gap: 15px;
    background: white;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .cart-item img {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 6px;
  }
  .cart-item .info { flex: 1; }
  .cart-item .info h4 { margin: 0 0 5px; }
  .qty-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qty-controls button {
    width: 26px;
    height: 26px;
    border: none;
    background: #eee;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
  }
  .remove-btn {
    background: none;
    border: none;
    color: #c0392b;
    cursor: pointer;
    font-weight: bold;
  }
  .summary {
    flex: 1;
    min-width: 250px;
    background: white;
    border-radius: 10px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    text-align: center;
  }
  .summary h2 { margin-top: 0; }
  .summary #total { font-size: 22px; font-weight: bold; }
  .summary button {
    margin-top: 15px;
    width: 100%;
    background: #e0521f;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
  }
  .summary button:hover { background: #c0392b; }
  .empty-msg {
    text-align: center;
    color: #777;
    padding: 40px 0;
  }
</style>
</head>
<body>

<header>
  <h1>My Cart</h1>
  <a href="product.html">← Continue Shopping</a>
</header>

<div class="main">
  <div id="cart-items"></div>

  <div class="summary">
    <h2>Total Amount</h2>
    <div id="total">₹0</div>
    <button id="place-order" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script>
  function getCart() {
    return JSON.parse(localStorage.getItem('cart')) || [];
  }

  function saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
  }

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('total');
    container.innerHTML = '';

    if (cart.length === 0) {
      container.innerHTML = '<div class="empty-msg">Your cart is empty.</div>';
      totalEl.innerText = '₹0';
      return;
    }

    let total = 0;
    cart.forEach((item, index) => {
      const lineTotal = item.price * item.qty;
      total += lineTotal;
      container.innerHTML += `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}">
          <div class="info">
            <h4>${item.name}</h4>
            <div>₹${item.price} each</div>
            <div class="qty-controls">
              <button onclick="changeQty(${index}, -1)">-</button>
              <span>${item.qty}</span>
              <button onclick="changeQty(${index}, 1)">+</button>
            </div>
          </div>
          <div>
            <div>₹${lineTotal}</div>
            <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
          </div>
        </div>
      `;
    });

    totalEl.innerText = '₹' + total;
  }

  function changeQty(index, delta) {
    const cart = getCart();
    cart[index].qty += delta;
    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }
    saveCart(cart);
    renderCart();
  }

  function removeItem(index) {
    const cart = getCart();
    cart.splice(index, 1);
    saveCart(cart);
    renderCart();
  }

  function placeOrder() {
    const cart = getCart();
    if (cart.length === 0) {
      alert('Your cart is empty!');
      return;
    }
    alert('Order placed successfully!');
    localStorage.removeItem('cart');
    renderCart();
  }

  renderCart();
</script>

</body>
</html>
